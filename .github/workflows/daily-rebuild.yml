name: Daily Rebuild

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6 AM UTC (9 AM Romania)
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch rating data
        run: node scripts/fetch-rating.mjs

      - name: Generate redirects
        run: node scripts/generate-redirects.mjs

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=frigidereieftine-ro --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
